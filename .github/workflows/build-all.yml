name: Build All Platforms

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --target x86_64-pc-windows-msvc --bin agy-switch
      - uses: actions/upload-artifact@v4
        with:
          name: agy-switch-windows-x64.exe
          path: target/x86_64-pc-windows-msvc/release/agy-switch.exe

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl --bin agy-switch
      - uses: actions/upload-artifact@v4
        with:
          name: agy-switch-linux-x64
          path: target/x86_64-unknown-linux-musl/release/agy-switch

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - run: cargo build --release --target aarch64-unknown-linux-musl --bin agy-switch
      - uses: actions/upload-artifact@v4
        with:
          name: agy-switch-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/agy-switch

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin --bin agy-switch
      - uses: actions/upload-artifact@v4
        with:
          name: agy-switch-macos-arm64
          path: target/aarch64-apple-darwin/release/agy-switch

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin --bin agy-switch
      - uses: actions/upload-artifact@v4
        with:
          name: agy-switch-macos-x64
          path: target/x86_64-apple-darwin/release/agy-switch
