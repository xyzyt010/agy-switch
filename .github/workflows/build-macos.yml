name: Build macOS ARM64

on:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin --bin agy-switch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agy-switch-macos-arm64
          path: target/aarch64-apple-darwin/release/agy-switch
